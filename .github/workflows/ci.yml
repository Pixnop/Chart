name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into the Node.js 24 action runtime ahead of the June 2026 forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Build, test & SonarCloud
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup JDK 17 (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Vintage Story server
        id: cache-vs
        uses: actions/cache@v4
        with:
          path: ~/vs
          key: vs-server-linux-x64-1.22.2

      - name: Download Vintage Story server (for API DLL references)
        if: steps.cache-vs.outputs.cache-hit != 'true'
        run: |
          set -e
          curl -sSL --proto '=https' --proto-redir '=https' -o vs_server.tar.gz "https://cdn.vintagestory.at/gamefiles/stable/vs_server_linux-x64_1.22.2.tar.gz"
          mkdir -p "$HOME/vs"
          tar -xzf vs_server.tar.gz -C "$HOME/vs"

      - name: Export VINTAGE_STORY
        run: |
          set -e
          DLL_DIR="$(dirname "$(find "$HOME/vs" -name VintagestoryAPI.dll | head -1)")"
          echo "VINTAGE_STORY=$DLL_DIR" >> "$GITHUB_ENV"
          echo "Resolved VINTAGE_STORY=$DLL_DIR"

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"Pixnop_Chart" \
            /o:"leon-fievet-pixnop" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.coverage.exclusions="**/ChartModSystem.cs,**/DimensionAwareChunkMapLayer.cs,**/DimensionTracker.cs,**/EntityPosAccess.cs,**/VanillaMapPalette.cs"

      - name: Build
        run: dotnet build Chart.slnx -c Release

      - name: Test with coverage
        # --no-build is intentionally omitted: coverlet instruments assemblies at
        # build time via the collector, so we let dotnet test rebuild with the
        # coverage collector active.  The extra compile is cheap vs. a missing
        # coverage report.
        run: |
          dotnet test tests/Chart.Pure.Tests \
            -c Release \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings

      - name: SonarCloud end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
